# Minimal Clash configuration example

mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning

proxies:
  - name: placeholder
    type: ss
    server: example.com
    port: 8388
    cipher: aes-256-gcm
    password: CHANGE_ME

proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - placeholder
      - DIRECT

rules:
  - MATCH,PROXY
